# Global pipeline settings

# Inference backend: lmstudio | llamacpp | auto.
# auto picks lmstudio on macOS (MacBook Air) and llamacpp elsewhere (the
# Linux/RTX 3090 server). Override per invocation with `eval --backend ...`
# or the EVAL_BACKEND environment variable.
backend: auto

lmstudio:
  base_url: http://localhost:1234/v1
  # Seconds to wait for the server to answer a chat request. The 27B reasoning
  # model routinely needs 8-10 minutes per document (thinking + writing), so
  # leave generous headroom.
  request_timeout: 1800
  load_timeout: 300
  retries: 2

llamacpp:
  # llama.cpp `llama-server` in Docker; the pipeline swaps models by
  # recreating the compose service with LLAMA_MODEL / LLAMA_CTX_SIZE set.
  base_url: http://localhost:8080/v1
  # `~` is expanded on load. Point elsewhere in config/settings.local.yaml
  # (untracked) rather than editing this file.
  compose_dir: ~/lcpp-docker
  compose_service: llama
  # Model volume mount point inside the container (the compose file mounts
  # /mnt/data-one/llama-models there); bare gguf names resolve under it.
  container_model_dir: /models
  # The same directory as seen from the host, used only by `eval discover` to
  # enumerate gguf files. When it does not exist (running discovery from the
  # Mac), discovery lists the directory inside the container instead.
  host_model_dir: /mnt/data-one/llama-models
  request_timeout: 1800
  # Container start + gguf load into VRAM (mlock'd, from spinning storage
  # this can take several minutes for the big models).
  load_timeout: 900
  retries: 2

database: results.sqlite
runs_dir: runs
reports_dir: reports

code_runner:
  # Only these fenced-block languages are executed; everything else is skipped.
  allowed_languages: [python, bash, sh]
  timeout_seconds: 30

lychee:
  offline: true
  allowlist: []

# Defaults stamped onto entries proposed by `eval discover`. Discovery never
# rewrites an existing entry's parameters — these apply to new rows only.
discovery:
  # Case-insensitive substrings; matching models are never proposed.
  exclude: [-embed, embedding, reranker, whisper]
  temperature: 0.7
  seed: 42
  max_tokens: 32768
  context_length: 65536
  # Applied only with `eval discover --role judge|both`.
  judge_skills: [style-guide, factuality, completeness, audience-fit, code-quality, pairwise-compare]
  judge_temperature: 0.0
  judge_max_tokens: 32768
  # Judges see one document (two for pairwise) plus a rubric — a few thousand
  # tokens. Without this the backend loads at the model's max context and the
  # KV cache alone pushes the Mac into swap.
  judge_context_length: 16384
