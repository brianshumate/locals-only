# Judge models and which skills each one runs. Judges use temperature 0 and
# JSON mode. Every subjective skill must be listed under >=2 judges.
#
# Backends work as in authors.yaml: `model` is the LM Studio identity, a
# `backends: llamacpp:` entry maps to a gguf on the Linux server. Judges
# without an entry for the active backend are skipped there — keep >=2
# judges per skill available on each backend.
judges:
  # llama.cpp only — not installed in LM Studio on the Mac.
  - id: judge-gemma-4-26b
    backends:
      llamacpp:
        model: gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
    temperature: 0.0
    max_tokens: 32768
    skills: [style-guide, factuality, completeness, audience-fit, code-quality, pairwise-compare]

  # llama.cpp only — not installed in LM Studio on the Mac.
  - id: judge-qwen3.6-27b
    backends:
      llamacpp:
        model: Qwen3.6-27B-MTP-Q4_K_M.gguf
    temperature: 0.0
    max_tokens: 32768
    skills: [style-guide, factuality, completeness, audience-fit, code-quality, pairwise-compare]

  # LM Studio only — no gguf on the Linux server. These keep >=2 judges
  # per skill on the Mac now that the 26B/27B judges are llama.cpp only.
  - id: judge-gemma-4-12b
    model: google/gemma-4-12b-qat
    temperature: 0.0
    max_tokens: 32768
    skills: [style-guide, factuality, completeness, audience-fit, code-quality, pairwise-compare]

  - id: judge-lfm2-24b
    model: liquid/lfm2-24b-a2b
    temperature: 0.0
    max_tokens: 32768
    skills: [style-guide, factuality, completeness, audience-fit, code-quality, pairwise-compare]

  - id: judge-qwen3.5-9b
    model: qwen3.5-9b-mtp
    temperature: 0.0
    max_tokens: 32768
    skills: [style-guide, completeness, audience-fit, pairwise-compare]

